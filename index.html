<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise For You</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-deep: #0d0608;
            --bg-mid: #1a0c0f;
            --rose: #8B2252;
            --rose-lt: #c4547a;
            --gold: #c9a96e;
            --gold-lt: #e8d5a3;
            --cream: #f5ece4;
            --muted: #a07080;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-b: rgba(255, 255, 255, 0.10);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        .icon {
            display: inline-block;
            vertical-align: -5px;
            width: 22px;
            height: 22px;
            margin-left: 8px;
            opacity: 0.85;
        }

        .icon-btn {
            display: inline-block;
            vertical-align: -4px;
            width: 18px;
            height: 18px;
            margin-left: 5px;
            opacity: 0.8;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: var(--bg-deep);
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(139, 34, 82, 0.25) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 80%, rgba(80, 10, 30, 0.35) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 0%, rgba(201, 169, 110, 0.08) 0%, transparent 50%);
            color: var(--cream);
            overflow-x: hidden;
            min-height: 100vh;
            width: 100vw;
            position: relative;
        }

        h1,
        h2,
        h3 {
            font-family: 'Cinzel', serif;
            letter-spacing: 0.05em;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Floating Particles */
        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            bottom: -20px;
            font-size: 1rem;
            animation: floatUp linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 0.5;
            }

            90% {
                opacity: 0.4;
            }

            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Cursor Trail */
        .cursor-heart {
            position: fixed;
            pointer-events: none;
            font-size: 0.8rem;
            color: var(--rose-lt);
            transform: translate(-50%, -50%);
            animation: fadeAndRise 1.2s forwards;
            z-index: 9999;
        }

        @keyframes fadeAndRise {
            0% {
                opacity: 0.9;
                transform: translate(-50%, -50%) scale(1);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -120px) scale(0.4);
            }
        }

        /* Page Layout */
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s ease, visibility 0.6s;
            z-index: 10;
            padding: 20px;
        }

        .page.active {
            opacity: 1;
            visibility: visible;
        }

        /* Subtle rose divider */
        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            margin: 16px auto;
        }

        /* Global UI Elements */
        button {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            padding: 12px 28px;
            border: 1px solid rgba(201, 169, 110, 0.35);
            border-radius: 40px;
            background: rgba(139, 34, 82, 0.15);
            backdrop-filter: blur(8px);
            color: var(--gold-lt);
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            margin: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            background: rgba(139, 34, 82, 0.35);
            border-color: var(--gold);
            box-shadow: 0 8px 30px rgba(139, 34, 82, 0.4);
        }

        /* --- Page 1: Greeting --- */
        .greeting-img {
            width: 220px;
            height: 220px;
            margin-bottom: 28px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.3), 0 0 40px rgba(139, 34, 82, 0.5);
            animation: floatImg 4s ease-in-out infinite;
        }

        @keyframes floatImg {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-12px);
            }
        }

        .greeting-text {
            font-size: 1.4rem;
            font-weight: 300;
            font-style: italic;
            font-family: 'Cormorant Garamond', serif;
            text-align: center;
            margin-bottom: 28px;
            padding: 0 24px;
            color: var(--cream);
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            gap: 16px;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60% {
                transform: translateX(-8px);
            }

            40%,
            80% {
                transform: translateX(8px);
            }
        }

        .shake-element {
            animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
        }

        /* --- Page 2: Password --- */
        .password-card {
            background: rgba(20, 8, 14, 0.7);
            backdrop-filter: blur(16px);
            padding: 36px 28px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(201, 169, 110, 0.2);
            transition: all 0.3s ease;
            width: 90%;
            max-width: 360px;
        }

        .password-card.error {
            box-shadow: 0 20px 50px rgba(180, 30, 30, 0.3);
            border-color: rgba(220, 50, 50, 0.4);
            animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
        }

        .password-card h2 {
            margin-bottom: 20px;
            font-size: 1.1rem;
            letter-spacing: 0.12em;
            color: var(--gold-lt);
        }

        .calc-display {
            width: 100%;
            height: 52px;
            font-size: 1.6rem;
            text-align: center;
            border: 1px solid rgba(201, 169, 110, 0.3);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.35);
            color: var(--gold-lt);
            font-family: 'Cinzel', serif;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            letter-spacing: 4px;
        }

        .calc-keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 18px;
        }

        .calc-btn {
            margin: 0;
            padding: 16px 0;
            font-size: 1.2rem;
            border-radius: 10px;
            background: rgba(139, 34, 82, 0.12);
            border: 1px solid rgba(201, 169, 110, 0.15);
            color: var(--cream);
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'Cinzel', serif;
        }

        .calc-btn:hover {
            background: rgba(139, 34, 82, 0.35);
            border-color: rgba(201, 169, 110, 0.4);
            transform: scale(1.05);
        }

        .error-msg {
            color: #e07070;
            font-size: 0.9rem;
            font-style: italic;
            margin-top: -8px;
            margin-bottom: 10px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* --- Page 3: Gift Box --- */
        .gift-container {
            position: relative;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .gift-icon-wrap {
            width: 180px;
            height: 180px;
            border-radius: 24px;
            background: rgba(139, 34, 82, 0.12);
            border: 1px solid rgba(201, 169, 110, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 60px rgba(139, 34, 82, 0.3);
            transition: transform 0.1s;
        }

        .gift-icon-wrap.open {
            animation: giftExplode 1.5s forwards;
        }

        .gift-text {
            font-size: 1.4rem;
            letter-spacing: 0.1em;
            margin-bottom: 10px;
            color: var(--gold-lt);
        }

        .tap-counter {
            font-size: 0.9rem;
            font-style: italic;
            color: var(--muted);
            margin-bottom: 30px;
        }

        /* Gift Box Image */
        .gift-img {
            width: 250px;
            height: 250px;
            object-fit: contain;
            mix-blend-mode: multiply;
            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.25));
            transition: transform 0.1s;
        }

        .gift-img.open {
            animation: giftExplode 1.5s forwards;
        }

        @keyframes giftExplode {
            0% {
                transform: scale(1) rotate(0);
                opacity: 1;
                filter: brightness(1);
            }

            20% {
                transform: scale(1.2) rotate(-10deg);
                filter: brightness(1.2);
            }

            40% {
                transform: scale(1.2) rotate(10deg);
                filter: brightness(1.2);
            }

            100% {
                transform: scale(0) rotate(0);
                opacity: 0;
                filter: brightness(2);
            }
        }

        .burst-light {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(201, 169, 110, 0.8) 0%, rgba(139, 34, 82, 0.4) 40%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
            z-index: 1;
        }

        /* Animations for Gift */
        .jiggle-1 {
            animation: jiggle 0.3s ease-in-out;
        }

        .jiggle-2 {
            animation: jiggle 0.2s ease-in-out infinite;
        }

        .jiggle-3 {
            animation: jiggle 0.1s ease-in-out infinite;
        }

        .jiggle-4 {
            animation: shake 0.1s infinite;
        }

        @keyframes jiggle {

            0%,
            100% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(-2deg);
            }

            50% {
                transform: rotate(2deg);
            }

            75% {
                transform: rotate(-2deg);
            }
        }

        .gift-icon-wrap.open~.burst-light {
            animation: burstExplosion 1.8s forwards;
        }

        @keyframes burstExplosion {
            0% {
                width: 0;
                height: 0;
                opacity: 0.9;
            }

            40% {
                width: 400px;
                height: 400px;
                opacity: 0.6;
            }

            100% {
                width: 700px;
                height: 700px;
                opacity: 0;
            }
        }

        /* Petal / Sparkle particles */
        .petal {
            position: fixed;
            pointer-events: none;
            z-index: 99;
            font-size: 1rem;
            animation: petalFall 2.5s ease-out forwards;
        }

        @keyframes petalFall {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 1;
            }

            60% {
                opacity: 0.8;
            }

            100% {
                transform: translateY(260px) rotate(540deg) scale(0.4);
                opacity: 0;
            }
        }


        /* --- Page 4: Catalogues --- */
        .catalog-container {
            display: flex;
            gap: 24px;
            justify-content: center;
            width: 100%;
            padding: 0 16px;
        }

        .catalog-card {
            width: 160px;
            height: 210px;
            background: rgba(20, 8, 14, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(201, 169, 110, 0.2);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            transition: all 0.4s ease;
            color: var(--cream);
        }

        .catalog-card:hover {
            transform: translateY(-8px);
            border-color: rgba(201, 169, 110, 0.5);
            box-shadow: 0 20px 50px rgba(139, 34, 82, 0.4);
        }

        .catalog-title {
            font-size: 1rem;
            letter-spacing: 0.15em;
            font-family: 'Cinzel', serif;
            color: var(--gold-lt);
            text-align: center;
        }

        @media (max-width: 380px) {
            .catalog-container {
                gap: 16px;
            }
            .catalog-card {
                width: 135px;
                height: 180px;
            }
            .catalog-title {
                font-size: 0.85rem;
            }
        }


        /* --- Page 4A: Message --- */
        .envelope-wrapper {
            position: relative;
            width: 280px;
            height: 190px;
            cursor: pointer;
            margin-top: 30px;
        }

        .envelope {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(160deg, #f5e6d8, #e8d0bc);
            border-radius: 10px;
            box-shadow: 0 15px 50px rgba(139, 34, 82, 0.4), 0 0 0 1px rgba(201, 169, 110, 0.4);
            z-index: 1;
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(160deg, #e8d0bc, #d4b89a);
            clip-path: polygon(0 0, 50% 50%, 100% 0);
            z-index: 4;
            transform-origin: top;
            transition: transform 0.8s ease-in-out, z-index 0s 0.4s;
        }

        .envelope-wrapper.open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope-front {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(160deg, #f0d9c4, #dfc2a8);
            clip-path: polygon(0 100%, 0 0, 50% 50%, 100% 0, 100% 100%);
            z-index: 3;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        .letter-stub {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 260px;
            height: 130px;
            background: linear-gradient(160deg, #f5ece4, #e8d8cc);
            border-radius: 4px;
            z-index: 2;
            transition: transform 0.8s 0.4s ease-in-out, opacity 0.3s 1.2s;
        }

        .envelope-wrapper.open .letter-stub {
            transform: translate(-50%, -140px);
            opacity: 0;
        }

        .envelope-hint {
            margin-top: 30px;
            font-size: 0.85rem;
            font-style: italic;
            letter-spacing: 0.08em;
            color: var(--muted);
        }

        .letter-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 99999;
            pointer-events: none;
            opacity: 0;
            background: rgba(8, 3, 6, 0.85);
            backdrop-filter: blur(8px);
            transition: opacity 0.5s ease;
        }

        .letter-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .letter {
            position: absolute;
            top: 50%;
            left: 5%;
            width: 90%;
            transform: translateY(-50%) scale(0.94);
            background: linear-gradient(160deg, #f5ece4, #ede0d6);
            border-radius: 12px;
            padding: 30px 24px 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            max-height: 82vh;
            overflow-y: auto;
            border: 1px solid rgba(201, 169, 110, 0.3);
            font-size: 1.15rem;
            line-height: 1.75;
            text-align: center;
            color: #2a100c;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .letter-overlay.open .letter {
            transform: translateY(-50%) scale(1);
        }

        .letter p {
            margin-bottom: 14px;
            font-family: 'Cormorant Garamond', serif;
        }

        .close-letter {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            font-size: 1.8rem;
            color: var(--rose);
            cursor: pointer;
            margin: 0;
            box-shadow: none;
            padding: 0;
            line-height: 1;
        }

        .close-letter:hover {
            background: none;
            box-shadow: none;
            transform: scale(1.2);
        }


        /* --- Page 4B: Images --- */
        .gallery-container {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            max-width: 900px;
            max-height: 75vh;
            overflow-y: auto;
            padding: 16px;
        }

        /* Hide scrollbar */
        .gallery-container::-webkit-scrollbar,
        .letter::-webkit-scrollbar {
            display: none;
        }

        .polaroid {
            background: linear-gradient(160deg, #1e0c12, #150810);
            border: 1px solid rgba(201, 169, 110, 0.2);
            border-radius: 10px;
            overflow: hidden;
            cursor: default;
            transition: all 0.3s ease;
            width: calc(33.333% - 14px);
            min-width: 120px;
        }

        @media (max-width: 480px) {
            .polaroid {
                width: calc(50% - 10px);
            }
        }

        .polaroid img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            display: block;
        }

        .polaroid-caption {
            font-size: 0.75rem;
            font-style: italic;
            padding: 8px;
            text-align: center;
            color: var(--muted);
            font-family: 'Cormorant Garamond', serif;
        }

        .polaroid:nth-child(even) {
            transform: rotate(1.5deg);
        }

        .polaroid:nth-child(odd) {
            transform: rotate(-1.5deg);
        }

        .polaroid:hover {
            border-color: rgba(201, 169, 110, 0.4);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 2, 4, 0.96);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99998;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s;
        }

        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }

        .lightbox-content {
            position: relative;
            max-width: 92%;
            max-height: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(139, 34, 82, 0.3);
        }

        .lightbox-caption {
            color: var(--gold-lt);
            margin-top: 16px;
            font-size: 1rem;
            font-style: italic;
            text-align: center;
        }

        .lightbox-close {
            position: absolute;
            top: -38px;
            right: 0;
            color: var(--muted);
            font-size: 1.8rem;
            cursor: pointer;
            background: none;
            border: none;
            box-shadow: none;
            margin: 0;
        }

        .lightbox-close:hover {
            background: none;
            box-shadow: none;
            color: var(--cream);
            transform: scale(1.1);
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(139, 34, 82, 0.2);
            border: 1px solid rgba(201, 169, 110, 0.2);
            color: var(--gold-lt);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            margin: 0;
        }

        .nav-btn:hover {
            background: rgba(139, 34, 82, 0.5);
            border-color: var(--gold);
            box-shadow: none;
        }

        .nav-prev {
            left: 8px;
        }

        .nav-next {
            right: 8px;
        }

        .back-btn {
            position: absolute;
            top: 16px;
            left: 14px;
            z-index: 100;
            font-size: 0.82rem;
            padding: 8px 16px;
        }
    </style>
</head>

<body>

    <!-- Background Particles -->
    <div class="particles-container" id="particles"></div>

    <!-- PAGE 0: Entrance -->
    <div class="page active" id="page-0">
        <div class="greeting-icon-wrap" style="animation: none;">
            <i data-lucide="sparkles" style="width:64px;height:64px;color:var(--gold)"></i>
        </div>
        <h1 class="greeting-text" style="margin-top: 20px;">A Special Surprise Awaits</h1>
        <p style="color: var(--muted); font-style: italic; margin-bottom: 40px; font-size: 0.9rem;">Please turn up your
            volume</p>
        <button id="btn-enter">Enter <i data-lucide="arrow-right" class="icon-btn"></i></button>
    </div>

    <!-- PAGE 1: Greeting -->
    <div class="page" id="page-1">
        <div class="greeting-icon-wrap">
            <i data-lucide="heart" style="width:72px;height:72px;color:var(--rose-lt)"></i>
        </div>
        <h2 style="font-size:0.75rem;letter-spacing:0.25em;color:var(--gold);margin-bottom:12px;">A SURPRISE FOR YOU
        </h2>
        <div class="divider"></div>
        <h1 class="greeting-text" id="greeting-text">Would you like to see what I made for you?</h1>
        <div class="btn-group">
            <button id="btn-yes">Yes <i data-lucide="heart" class="icon-btn"></i></button>
            <button id="btn-no">No <i data-lucide="frown" class="icon-btn"></i></button>
        </div>
    </div>

    <!-- PAGE 2: Password -->
    <div class="page" id="page-2">
        <div class="password-card" id="password-card">
            <h2>Our special date <i data-lucide="lock" class="icon"></i></h2>
            <div class="divider"></div>
            <div class="calc-display" id="calc-display"></div>
            <div class="calc-keypad">
                <button class="calc-btn">1</button>
                <button class="calc-btn">2</button>
                <button class="calc-btn">3</button>
                <button class="calc-btn">4</button>
                <button class="calc-btn">5</button>
                <button class="calc-btn">6</button>
                <button class="calc-btn">7</button>
                <button class="calc-btn">8</button>
                <button class="calc-btn">9</button>
                <button class="calc-btn" id="calc-clear">C</button>
                <button class="calc-btn">0</button>
                <button class="calc-btn" id="calc-del"><i data-lucide="delete"
                        style="width:20px;height:20px;vertical-align:-4px"></i></button>
            </div>
            <div class="error-msg" id="pass-error">Hmm, think again my love <i data-lucide="cloud-rain"
                    class="icon-btn"></i></div>
        </div>
    </div>

    <!-- PAGE 3: Gift Box -->
    <div class="page" id="page-3">
        <h1 class="gift-text">Happy Birthday <i data-lucide="sparkles" class="icon"></i></h1>
        <div class="tap-counter" id="tap-counter">5 more taps to open the gift...</div>

        <div class="gift-container" id="gift-box">
            <div class="gift-icon-wrap" id="box-anim">
                <i data-lucide="gift" style="width:90px;height:90px;color:var(--gold)"></i>
            </div>
            <div class="burst-light"></div>
        </div>
    </div>

    <!-- PAGE 4: Catalogues -->
    <div class="page" id="page-4">
        <h2 style="font-size:0.85rem;letter-spacing:0.2em;color:var(--gold);margin-bottom:8px;">A LITTLE SOMETHING</h2>
        <div class="divider"></div>
        <div class="catalog-container" style="margin-top:20px;">
            <div class="catalog-card" id="card-message">
                <i data-lucide="mail" style="width:52px;height:52px;margin-bottom:16px;color:var(--gold)"></i>
                <div class="catalog-title">Message</div>
            </div>
            <div class="catalog-card" id="card-images">
                <i data-lucide="image" style="width:52px;height:52px;margin-bottom:16px;color:var(--gold)"></i>
                <div class="catalog-title">Memories</div>
            </div>
        </div>
    </div>

    <!-- PAGE 4A: Message -->
    <div class="page" id="page-4a">
        <button class="back-btn" onclick="goToPage('page-4')">← Back</button>
        <div class="envelope-wrapper" id="envelope">
            <div class="envelope"></div>
            <div class="letter-stub"></div>
            <div class="envelope-front"></div>
            <div class="envelope-flap"></div>
        </div>
        <p class="envelope-hint">Tap the envelope to open</p>
    </div>

    <!-- PAGE 4B: Images -->
    <div class="page" id="page-4b">
        <button class="back-btn" onclick="goToPage('page-4')">← Back</button>
        <div class="gallery-container" id="gallery">
            <!-- Images injected from JSON -->
        </div>
    </div>

    <!-- Letter Overlay (Moved outside pages for robust centering) -->
    <div class="letter-overlay" id="letter-overlay">
        <div class="letter">
            <button class="close-letter" id="close-letter">×</button>
            <div id="letter-content">
                <!-- Content injected from JSON -->
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lb-close">×</button>
        <button class="nav-btn nav-prev" id="lb-prev">‹</button>
        <div class="lightbox-content">
            <img src="" alt="Enlarged" class="lightbox-img" id="lb-img">
            <div class="lightbox-caption" id="lb-caption"></div>
        </div>
        <button class="nav-btn nav-next" id="lb-next">›</button>
    </div>


    <!-- Hidden Audio Player -->
    <audio id="bg-music" loop>
        <source src="Madhuram madhuram Bgm Ringtones.mp3" type="audio/mpeg">
    </audio>

    <script>
        // CONFIG
        const PASSWORD = "08-08-2025"; // DD-MM-YYYY format

        // State variables
        let currentPhotos = [];
        let currentPhotoIndex = 0;

        // Utility: Generate floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            const icons = ['✦', '✧', '⋆', '·', '❧'];
            setInterval(() => {
                const el = document.createElement('div');
                el.classList.add('particle');
                el.innerText = icons[Math.floor(Math.random() * icons.length)];
                el.style.color = ['#c4547a', '#c9a96e', '#8B2252', '#e8d5a3'][Math.floor(Math.random() * 4)];
                el.style.left = Math.random() * 100 + 'vw';
                el.style.animationDuration = (Math.random() * 7 + 6) + 's';
                container.appendChild(el);
                setTimeout(() => el.remove(), 13000);
            }, 900);
        }
        createParticles();

        // Utility: Cursor Trail
        document.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.8) { // Don't create on every tick
                const heart = document.createElement('div');
                heart.classList.add('cursor-heart');
                heart.innerText = '♡';
                heart.style.color = '#FFB6C1';
                heart.style.left = e.pageX + 'px';
                heart.style.top = e.pageY + 'px';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 1000);
            }
        });

        // Navigation
        function goToPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // --- PAGE 0 LOGIC ---
        const btnEnter = document.getElementById('btn-enter');
        btnEnter.addEventListener('click', () => {
            // Play background music on first interaction
            const bgMusic = document.getElementById('bg-music');
            if (bgMusic.paused) {
                bgMusic.volume = 0.5; // Soft background volume
                bgMusic.play().catch(e => console.log("Audio autoplay prevented by browser"));
            }
            goToPage('page-1');
        });

        // --- PAGE 1 LOGIC ---
        const btnYes = document.getElementById('btn-yes');
        const btnNo = document.getElementById('btn-no');
        const greetingText = document.getElementById('greeting-text');

        btnYes.addEventListener('click', () => goToPage('page-2'));

        btnNo.addEventListener('click', () => {
            btnNo.classList.add('shake-element');
            greetingText.innerHTML = 'There is no other option, my love ♥';
            setTimeout(() => {
                btnNo.style.display = 'none';
            }, 500);
        });

        // --- PAGE 2 LOGIC ---
        const calcDisplay = document.getElementById('calc-display');
        const passError = document.getElementById('pass-error');
        const passwordCard = document.getElementById('password-card');
        let enteredPassword = "";

        // Format password string as DD-MM-YYYY
        function formatPassword(pw) {
            let res = pw;
            if (res.length > 2) res = res.slice(0, 2) + '-' + res.slice(2);
            if (res.length > 5) res = res.slice(0, 5) + '-' + res.slice(5);
            return res;
        }

        function updateDisplay() {
            calcDisplay.innerText = formatPassword(enteredPassword);
            if (enteredPassword.length === 8) {
                checkPassword();
            }
        }

        document.querySelectorAll('.calc-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (btn.id === 'calc-clear') {
                    enteredPassword = "";
                } else if (btn.id === 'calc-del') {
                    enteredPassword = enteredPassword.slice(0, -1);
                } else if (enteredPassword.length < 8) {
                    enteredPassword += e.target.innerText;
                }
                updateDisplay();
            });
        });

        function checkPassword() {
            const formatted = formatPassword(enteredPassword);
            if (formatted === PASSWORD) {
                // Success confetti
                for (let i = 0; i < 30; i++) {
                    const c = document.createElement('div');
                    c.classList.add('confetti');
                    c.style.left = Math.random() * 100 + '%';
                    c.style.top = Math.random() * 100 + 'px';
                    c.style.backgroundColor = ['#FFD700', '#FF69B4', '#87CEFA', '#98FB98'][Math.floor(Math.random() * 4)];
                    document.body.appendChild(c);
                    setTimeout(() => c.remove(), 2000);
                }
                setTimeout(() => goToPage('page-3'), 1000);
            } else {
                // Error
                passwordCard.classList.remove('error');
                void passwordCard.offsetWidth; // trigger reflow
                passwordCard.classList.add('error');
                passError.style.opacity = '1';
                setTimeout(() => passError.style.opacity = '0', 3000);
                enteredPassword = ""; // reset after wrong
                setTimeout(updateDisplay, 500); // clear display slightly after
            }
        }

        // --- PAGE 3 LOGIC ---
        let taps = 0;
        const giftBox = document.getElementById('gift-box');
        const boxAnim = document.getElementById('box-anim');
        const tapCounter = document.getElementById('tap-counter');

        giftBox.addEventListener('click', () => {
            if (taps >= 5) return;
            taps++;

            boxAnim.className = 'gift-icon-wrap'; // reset class
            void boxAnim.offsetWidth;

            if (taps === 1) boxAnim.classList.add('jiggle-1');
            if (taps === 2) boxAnim.classList.add('jiggle-2');
            if (taps === 3) boxAnim.classList.add('jiggle-3');
            if (taps === 4) boxAnim.classList.add('jiggle-4');

            tapCounter.innerText = `${5 - taps} more taps to open the gift...`;

            if (taps === 5) {
                tapCounter.innerText = "YAY! ✦";
                boxAnim.classList.remove('jiggle-4');
                boxAnim.classList.add('open');

                // Explode confetti
                for (let i = 0; i < 50; i++) {
                    const c = document.createElement('div');
                    c.classList.add('confetti');
                    c.style.left = (50 + (Math.random() - 0.5) * 50) + '%';
                    c.style.top = '50%';
                    c.style.backgroundColor = ['#FFD700', '#FF69B4', '#87CEFA', '#98FB98'][Math.floor(Math.random() * 4)];
                    document.body.appendChild(c);
                    setTimeout(() => c.remove(), 2000);
                }

                setTimeout(() => goToPage('page-4'), 2500);
            }
        });


        // --- PAGE 4 LOGIC (Fetching JSON & Rendering) ---
        document.getElementById('card-message').addEventListener('click', () => goToPage('page-4a'));
        document.getElementById('card-images').addEventListener('click', () => goToPage('page-4b'));

        // Load JSON Data
        fetch('messages.json')
            .then(res => res.json())
            .then(data => {
                // Populate Letter
                if (data.letter) {
                    const formattedLetter = data.letter.split('\n').map(p => `<p>${p}</p>`).join('');
                    document.getElementById('letter-content').innerHTML = formattedLetter;
                }

                // Populate Images
                if (data.images && data.images.length > 0) {
                    currentPhotos = data.images;
                    const gallery = document.getElementById('gallery');
                    gallery.innerHTML = '';

                    data.images.forEach((img, index) => {
                        const card = document.createElement('div');
                        card.classList.add('polaroid');
                        card.innerHTML = `
                            <img src="images/${img.filename}" alt="Memory" onerror="this.src='https://picsum.photos/400/400?random=${index}'">
                            <div class="polaroid-caption">${img.caption}</div>
                        `;
                        // lightbox disabled
                        gallery.appendChild(card);
                    });
                }
            })
            .catch(err => {
                console.error("Error loading messages.json", err);
                document.getElementById('letter-content').innerHTML = "<p>My Dearest Love,</p><p>Happy Birthday! (Sample Text)</p>";
            });

        // Envelope Animation
        document.getElementById('envelope').addEventListener('click', function () {
            if (this.classList.contains('open')) return;
            this.classList.add('open');
            setTimeout(() => {
                document.getElementById('letter-overlay').classList.add('open');
            }, 1200); // Wait for flap and stub to animate
        });

        document.getElementById('close-letter').addEventListener('click', function () {
            document.getElementById('letter-overlay').classList.remove('open');
            setTimeout(() => {
                document.getElementById('envelope').classList.remove('open');
            }, 500); // Close envelope after overlay fades
        });

        // Lightbox Logic
        const lightbox = document.getElementById('lightbox');
        const lbImg = document.getElementById('lb-img');
        const lbCaption = document.getElementById('lb-caption');

        function openLightbox(index) {
            currentPhotoIndex = index;
            updateLightbox();
            lightbox.classList.add('active');
        }

        function updateLightbox() {
            if (!currentPhotos.length) return;
            const imgData = currentPhotos[currentPhotoIndex];
            lbImg.src = `images/${imgData.filename}`;
            // fallback for missing local images
            lbImg.onerror = () => { lbImg.src = `https://picsum.photos/800/800?random=${currentPhotoIndex}`; };
            lbCaption.innerText = imgData.caption;
        }

        document.getElementById('lb-close').addEventListener('click', () => lightbox.classList.remove('active'));
        document.getElementById('lb-prev').addEventListener('click', () => {
            currentPhotoIndex = (currentPhotoIndex - 1 + currentPhotos.length) % currentPhotos.length;
            updateLightbox();
        });
        document.getElementById('lb-next').addEventListener('click', () => {
            currentPhotoIndex = (currentPhotoIndex + 1) % currentPhotos.length;
            updateLightbox();
        });

        // Initialize Icons
        lucide.createIcons();

    </script>
</body>

</html>
